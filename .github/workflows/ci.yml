name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: lint-

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Check lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ hashFiles('pyproject.toml') }}
          restore-keys: test-

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Create sample database
        run: python examples/create_db.py

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build (verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mcp-toolkit:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
